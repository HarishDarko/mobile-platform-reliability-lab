name: Terraform Destroy

on:
  workflow_dispatch:

env:
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_region: ${{ vars.GCP_REGION }}
  TF_VAR_artifact_repository_id: ${{ vars.ARTIFACT_REPOSITORY }}
  TF_VAR_demo_secret_id: demo-runtime-secret
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_github_deployer_service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT }}

jobs:
  destroy:
    name: Destroy GCP foundation
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform destroy
        run: terraform destroy -auto-approve
