name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      enable_gke_autopilot:
        description: Create a temporary GKE Autopilot cluster in the plan
        required: true
        default: false
        type: boolean
      gke_cluster_name:
        description: Optional GKE Autopilot cluster name
        required: true
        default: mobile-platform-lab-autopilot

env:
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_region: ${{ vars.GCP_REGION }}
  TF_VAR_artifact_repository_id: ${{ vars.ARTIFACT_REPOSITORY }}
  TF_VAR_demo_secret_id: demo-runtime-secret
  TF_VAR_github_repository: ${{ github.repository }}
  TF_VAR_github_deployer_service_account_email: ${{ secrets.GCP_SERVICE_ACCOUNT }}
  TF_VAR_enable_gke_autopilot: ${{ inputs.enable_gke_autopilot }}
  TF_VAR_gke_cluster_name: ${{ inputs.gke_cluster_name }}

jobs:
  plan:
    name: Plan GCP foundation
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="prefix=mobile-platform-reliability-lab"

      - name: Terraform plan
        run: terraform plan
