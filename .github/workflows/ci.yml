name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests and lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Run lint
        run: python -m ruff check app tests

  docker:
    name: Backend Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t mobile-platform-reliability-api:ci backend

  mobile:
    name: Mobile TypeScript check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Run mobile lint
        run: npm run lint

  kubernetes:
    name: Kubernetes manifest validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.2

      - name: Render Kubernetes manifests
        run: kubectl kustomize k8s

      - name: Render GKE LoadBalancer overlay
        run: kubectl kustomize k8s/overlays/gke

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check

      - name: Initialize Terraform
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate

  automation:
    name: Automation tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff

      - name: Run certificate monitor tests
        run: python -m pytest automation

      - name: Run automation lint
        run: python -m ruff check automation

  ansible:
    name: Ansible playbook validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible-core

      - name: Run Ansible syntax check
        run: ansible-playbook -i ansible/inventory.ini ansible/install_cert_monitor.yml --syntax-check

  apigee:
    name: Apigee proxy XML validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Apigee XML files
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          xml_files = sorted(Path("apigee/apiproxy").rglob("*.xml"))
          if not xml_files:
              raise SystemExit("No Apigee XML files found")

          for xml_file in xml_files:
              ET.parse(xml_file)
              print(f"validated {xml_file}")
          PY

  gateway:
    name: Gateway tests and lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest

      - name: Run lint
        run: python -m ruff check app tests
