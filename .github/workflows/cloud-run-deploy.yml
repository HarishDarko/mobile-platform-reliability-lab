name: Deploy Backend To Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to build and deploy
        required: true
        default: demo

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}
  IMAGE_NAME: mobile-platform-reliability-api
  SERVICE_NAME: mobile-platform-api

jobs:
  deploy:
    name: Build, push, and deploy backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build backend image
        run: |
          IMAGE_URI="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}:${{ inputs.image_tag }}"
          docker build -t "${IMAGE_URI}" backend
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Push backend image
        run: docker push "${IMAGE_URI}"

      - name: Deploy Cloud Run service
        run: |
          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_URI}" \
            --region "${REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars ALLOWED_ORIGINS="*" \
            --set-secrets DEMO_RUNTIME_SECRET=demo-runtime-secret:latest \
            --project "${PROJECT_ID}"

      - name: Print service URL
        run: |
          gcloud run services describe "${SERVICE_NAME}" \
            --region "${REGION}" \
            --project "${PROJECT_ID}" \
            --format "value(status.url)"
