apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-platform-api
  namespace: mobile-platform-lab
  labels:
    app.kubernetes.io/name: mobile-platform-api
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: mobile-platform-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mobile-platform-api
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: api
          image: mobile-platform-reliability-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret-example
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
